<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proposal | Ashta Siri Chits</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
    
    <script>
        var password = prompt("Please enter the Access Code to view the proposal:");
        if (password != "ASHTA2026") {
            alert("Incorrect code. Access Denied.");
            window.location.href = "https://orangecodebyte.com";
        }
    </script>
    
    <style>
   html, body, .reveal {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* 1. HIDE CUSTOM NAV BY DEFAULT (Desktop) */
        .mobile-nav {
            display: none; 
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
            gap: 10px;
            pointer-events: none;
        }

        /* 2. SHOW CUSTOM NAV ONLY ON MOBILE/TABLET */
        @media (max-width: 1024px) {
            .mobile-nav {
                display: flex;
            }
            /* Hide the default tiny Reveal.js arrows on mobile to use your big buttons */
            .reveal .controls {
                display: none !important;
            }
        }

        .nav-btn {
            pointer-events: auto;
            background: rgba(27, 58, 87, 0.9);
            color: white;
            border: 2px solid #FF8C00;
            width: 55px; /* Slightly larger for better thumb reach */
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:active {
            background: #FF8C00;
            transform: scale(0.9);
        }

        /* Ensure the iframe background covers everything */
        .reveal .slide-background-content iframe {
            width: 100vw !important;
            height: 100vh !important;
        }
    </style>
</head>

<body>
    <div class="mobile-nav">
        <div class="nav-btn" onclick="Reveal.prev()"><i class="fas fa-chevron-left"></i></div>
        <div class="nav-btn" onclick="Reveal.next()"><i class="fas fa-chevron-right"></i></div>
    </div>

    <div class="reveal">
        <div class="slides">
            <section data-background-iframe="slide1.html" data-background-interactive></section>
            <section data-background-iframe="slide2.html" data-background-interactive></section>
            <section data-background-iframe="slide3.html" data-background-interactive></section>
            <section data-background-iframe="slide4.html" data-background-interactive></section>
            <section data-background-iframe="slide5.html" data-background-interactive></section>
            <section data-background-iframe="slide6.html" data-background-interactive></section>
            <section data-background-iframe="slide7.html" data-background-interactive></section>
            <section data-background-iframe="slide8.html" data-background-interactive></section>
            <section data-background-iframe="slide9.html" data-background-interactive></section>
            <section data-background-iframe="slide10.html" data-background-interactive></section>
            <section data-background-iframe="slide11.html" data-background-interactive></section>
            <section data-background-iframe="slide12.html" data-background-interactive></section>
            <section data-background-iframe="slide13.html" data-background-interactive></section>
            <section data-background-iframe="slide14.html" data-background-interactive></section>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
    
    <script>
        Reveal.initialize({
            hash: true,
            respondToHashChanges: true,
            history: true,
            transition: 'slide',
            backgroundTransition: 'fade',
            
            // Mobile Optimization
            touch: true,
            controls: true,
            progress: true,
            center: false, // Set to false to allow iframes to start from top
            
            width: 1920, // Keep aspect ratio high
            height: 1080,
            margin: 0,
            minScale: 0.2,
            maxScale: 2.0,

            // Disable default layout to let iframes take full space
            disableLayout: false, 
            
            viewDistance: 2,
            mobileViewDistance: 1
        });
    </script>
</body>

</html>
